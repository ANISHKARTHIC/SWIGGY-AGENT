<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy Smart Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Swiggy Smart Agent</h1>

        <div class="response-area">
            <h2>Response:</h2>
            <pre id="response"></pre>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
